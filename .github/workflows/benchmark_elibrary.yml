name: eLibrary Bypass Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install curl_cffi cloudscraper scrapling[all] requests beautifulsoup4

      - name: Run eLibrary benchmark
        run: python3 scripts/benchmark_elibrary.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_elibrary_*.json
