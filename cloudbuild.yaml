steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/znayka:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/znayka:latest'
      - '-f'
      - 'Dockerfile.gcp'
      - '.'
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/znayka:$COMMIT_SHA'
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'znayka'
      - '--image'
      - 'gcr.io/$PROJECT_ID/znayka:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'znayka-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--add-cloudsql-instances'
      - '${_DB_CONNECTION}'
      - '--set-env-vars'
      - 'DATABASE_URL=${_DATABASE_URL},GOOGLE_CLOUD_PROJECT=$PROJECT_ID,USE_SQLITE=false'

images:
  - 'gcr.io/$PROJECT_ID/znayka:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/znayka:latest'

substitutions:
  _DATABASE_URL: postgresql+asyncpg://znayka:znayka@/znayka?host=/cloudsql/${PROJECT_ID}:us-central1:znayka-db
  _DB_CONNECTION: ${PROJECT_ID}:us-central1:znayka-db
